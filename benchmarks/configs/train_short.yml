# B0 — training fwd+bwd at the classic short-S ColBERT regime (Q≈32, D≈300).
# Measures stock HF vs the eager fused tail for one encoder fwd+bwd step, in bf16
# weights with no autocast (the clean kernel-only A/B). Answers: does the eager
# fused tail regress vs stock at short S in *training* (host-launch-bound, the
# backward doubling the launch count)? If so, training graphs are
# competitiveness-critical, exactly as they are for short-S inference.
run:
  validate: true            # run the flash-modernbert hard gate before measuring
  n_warmup: 15              # pay the CuteDSL JIT before timing
  n_iters: 30
  n_trials: 7

model:
  name_or_path: answerdotai/ModernBERT-base
  framework: huggingface
  dtype: bfloat16

# Q≈32 query batches and D≈288/320 doc batches (the short-S regime), at a few
# batch sizes spanning typical GradCache chunk sizes, plus an S=512 reference
# where the eager fused tail is known to win — to bracket the crossover.
shapes:
  - { b: 16,  s: 32,  kind: query }
  - { b: 32,  s: 32,  kind: query }
  - { b: 64,  s: 32,  kind: query }
  - { b: 16,  s: 288, kind: doc }
  - { b: 32,  s: 288, kind: doc }
  - { b: 16,  s: 512, kind: doc }

output:
  dir: benchmarks/results
  name: train_short
