# Long-S indexing — backend comparison: dense-mask SDPA vs FlashAttention.
# FA prunes the local (sliding-window) layers to the band instead of computing
# the full S×S, so this is where the structural win shows. Requires the
# flash-attn package (run in an env that has it); the default configs stay sdpa.
run:
  validate: true
  n_warmup: 10
  n_iters: 30
  n_trials: 5

model:
  name_or_path: answerdotai/ModernBERT-base
  framework: huggingface
  dtype: bfloat16

# Each backend gets a fused (eager) and a graphed variant, all vs one stock HF.
attention_backends: [sdpa, flash]

graph:
  pad_to: 64
  max_graphs: 32
  max_tokens: 8388608

shapes:
  - { b: 32, s: 512,  kind: doc }
  - { b: 16, s: 1024, kind: doc }
  - { b: 8,  s: 2048, kind: doc }
  - { b: 4,  s: 4096, kind: doc }

output:
  dir: benchmarks/results
  name: inference_indexing_fa
