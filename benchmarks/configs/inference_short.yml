# Short-S inference — the classic ColBERT regime (queries Q≈32, docs D≈300).
# This is where the eager fused tail is host-launch-bound and can lose to stock,
# and where capturing the core into a CUDA graph collapses the launch floor — the
# headline graphed win. Also serves as the roadmap's C3 short-S ColBERT config.
run:
  validate: true            # run the flash-modernbert hard gate before measuring
  n_warmup: 15              # pay CuteDSL JIT + graph capture before timing
  n_iters: 50
  n_trials: 7

model:
  name_or_path: answerdotai/ModernBERT-base
  framework: huggingface    # huggingface | pylate | sentence_transformers
  dtype: bfloat16

graph:
  pad_to: 32                # S=32/320 are exact multiples — no wasted padding
  max_graphs: 32

# Q≈32 query batches (a single bucket under query expansion) at growing B — the
# host-launch collapse should widen with B — plus D≈300 document batches.
shapes:
  - { b: 32,  s: 32,  kind: query }
  - { b: 128, s: 32,  kind: query }
  - { b: 256, s: 32,  kind: query }
  - { b: 32,  s: 320, kind: doc }
  - { b: 16,  s: 512, kind: doc }

output:
  dir: benchmarks/results
  name: inference_short
