# Fast synthetic smoke — controlled shapes, no dataset download.
# Good for a quick correctness + speed/memory sanity check.
run:
  max_steps: 40
  warmup_steps: 5
  seed: 42
  validate: true            # run the flash-modernbert hard gate on the fused model

model:
  name_or_path: answerdotai/ModernBERT-base
  dtype: bfloat16           # bfloat16 (clean, fair) | float32 (fp32 master + bf16 autocast)
  embedding_size: 128
  query_length: 32
  document_length: 512

dataset:
  type: synthetic
  batch_size: 16
  num_samples: 256          # fixed pool so the loss has a signal to descend
  num_negatives: 1
  query_len: 32
  doc_len: 512              # >=512 is where the fused tail wins; short S can lose
  vocab: 1024

loss:
  type: cached_contrastive  # cached_contrastive (GradCache, memory story) | contrastive
  mini_batch_size: 16

cuda_graph: false           # training graphs only accelerate the no-grad GradCache pass-1

optimizer:
  lr: 3.0e-5

output:
  dir: benchmarks/results
  name: synthetic_quick
