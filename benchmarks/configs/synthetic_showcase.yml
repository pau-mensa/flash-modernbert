# Larger synthetic shape — where the fused tail's speed and (especially) memory
# wins are pronounced. More negatives + bigger batch => more tokens per backward,
# which is what the in-place fused backward kernels save on.
run:
  max_steps: 25
  warmup_steps: 5
  seed: 42
  validate: false

model:
  name_or_path: answerdotai/ModernBERT-base
  dtype: bfloat16
  embedding_size: 128
  query_length: 32
  document_length: 512

dataset:
  type: synthetic
  batch_size: 32
  num_samples: 256
  num_negatives: 3
  query_len: 32
  doc_len: 512
  vocab: 1024

loss:
  type: cached_contrastive
  mini_batch_size: 32

cuda_graph: false

optimizer:
  lr: 3.0e-5

output:
  dir: benchmarks/results
  name: synthetic_showcase
