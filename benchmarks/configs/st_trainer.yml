# C2 — framework transparency: the SAME prepare() one-liner on a SentenceTransformers
# bi-encoder (NOT PyLate). Proves Decision-1 (the in-place monkeypatch) is transparent
# across frameworks — prepare() locates and patches the wrapped ModernBertModel, and
# the fused speed/memory delta holds, with zero per-framework adapter code. The only
# line that differs between the two runs is fm.prepare(model), exactly as in the PyLate
# recipe (msmarco_trainer.yml). Raw HF AutoModel training transparency is train_bench.py.
run:
  max_steps: 60
  max_seconds: null
  warmup_steps: 8            # first steps excluded from the throughput median (CuteDSL JIT)
  # validate is OFF for this recipe. The hard gate's bf16 band (0.997) is borderline
  # here for a NON-kernel reason: under the fp32-master + bf16-autocast trainer recipe,
  # accelerate/the trainer sets a global SDPA/matmul backend flag that nudges the *stock*
  # SDPA oracle's bf16 numerics at the local-attention window length (S=512), so fused-vs-
  # stock dips to ~0.9935. It is NOT a fused-path error: the same ST encoder in bf16
  # weights validates at 0.9988, raw HF / ST in isolation validate at 0.998, and the
  # training losses track stock. The fused numerics are gated on bf16 weights by
  # train_bench.py / iso_loss.py / the test suite.
  validate: false

model:
  framework: sentence_transformers
  name_or_path: answerdotai/ModernBERT-base   # ST adds a mean-pooling head over it
  max_seq_length: 512

dataset:
  type: synthetic            # in-memory random triplets — no network / dataset-schema
  num_samples: 512           # dependency, so the transparency A/B runs anywhere
  num_negatives: 1
  query_words: 8
  doc_words: 256             # lands docs near the 512-token cap, where the fused tail wins
  seed: 42

trainer:
  batch_size: 16
  gradient_accumulation_steps: 1
  learning_rate: 3.0e-5
  bf16: true                 # fp32 master + bf16 autocast (the canonical ST recipe)
  seed: 42

loss:
  type: cached_contrastive   # CachedMultipleNegativesRankingLoss (the GradCache analogue
  mini_batch_size: 16        # of PyLate's CachedContrastive); 'contrastive' = plain MNRL

cuda_graph: false            # inference-only; skipped under training autocast

output:
  dir: benchmarks/results
  name: st_trainer
