# Training-graph A/B at the classic short-S ColBERT regime (Q≈32), bf16 weights.
# GradCache chunks the batch into mini_batch_size pieces, so each encoder fwd+bwd
# the training graph captures is a (mini_batch_size, S) chunk — here (16, 32) for
# queries and (16, 320) for docs (D≈300). The (16, 32) query chunk is exactly the
# host-launch-bound shape where the eager fused tail regresses to 0.83× vs stock
# (roadmap B0); capturing its fwd+bwd into a graph should recover it.
#
# Run twice to see the training-graph win, flipping train_cuda_graph:
#   uv run benchmarks/iso_loss.py benchmarks/configs/train_graph_short.yml   # graphed
# then set train_cuda_graph: false for the eager-fused baseline.
run:
  max_steps: 60
  warmup_steps: 10 # pay CuteDSL JIT + graph capture before timing
  seed: 42
  validate: true

model:
  name_or_path: answerdotai/ModernBERT-base
  dtype: bfloat16 # clean kernel A/B (no autocast confound)
  embedding_size: 128
  query_length: 32
  document_length: 320 # the classic ColBERT D≈300 (matches inference_short)

dataset:
  type: synthetic
  batch_size: 32
  num_samples: 256
  num_negatives: 1
  query_len: 32 # Q≈32 — the short-S query regime
  doc_len: 320 # D≈300 — the classic ColBERT doc length
  vocab: 1024

loss:
  type: cached_contrastive # GradCache — the pass-3 chunk fwd+bwd is what graphs
  mini_batch_size: 16 # → chunks of (16, 32) queries and (16, 128) docs

cuda_graph: false # inference graphs (no-grad) — off here
train_cuda_graph: false # training-step graphs — the thing under test

shapes:
  - { b: 16, s: 32, kind: query }
  - { b: 4, s: 4096, kind: query }
  - { b: 16, s: 300, kind: doc }
  - { b: 32, s: 512, kind: doc }
  - { b: 16, s: 1024, kind: doc }
  - { b: 8, s: 2048, kind: doc }
  - { b: 4, s: 4096, kind: doc }
  - { b: 4, s: 8192, kind: doc }

optimizer:
  lr: 3.0e-5

output:
  dir: benchmarks/results
  name: train_graph_short
