# Real MS MARCO triplets — representative training loss curves over a time budget.
run:
  max_seconds: 120          # iso-time: the faster variant simply does more steps
  warmup_steps: 8
  seed: 42
  validate: true

model:
  name_or_path: answerdotai/ModernBERT-base
  dtype: bfloat16
  embedding_size: 128
  query_length: 32
  document_length: 512

dataset:
  type: huggingface
  name: sentence-transformers/msmarco-bm25
  split: train
  columns: [query, positive, negative]
  batch_size: 16

loss:
  type: cached_contrastive
  mini_batch_size: 16

cuda_graph: false

optimizer:
  lr: 3.0e-5

output:
  dir: benchmarks/results
  name: msmarco_iso_loss
