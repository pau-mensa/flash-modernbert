# Short-S training A/B — the ONLY regime where training graphs win (S=32, S=128).
# stock vs eager-fused vs graph[sdpa], one process (noise-free). At these lengths
# the eager fused tail is host-launch-bound and regresses vs stock; the graph
# collapses the launch floor and is the only variant that beats stock. (At S>=300
# eager-fused already wins and graphs are a wash-to-loss — measured, so omitted.)
#
#   uv run benchmarks/train_bench.py benchmarks/configs/train_graph_shortS.yml
run:
  validate: false   # already validated elsewhere; skip the gate to keep this fast
  n_warmup: 12      # pay CuteDSL JIT + graph capture before timing
  n_iters: 40
  n_trials: 7

model:
  name_or_path: answerdotai/ModernBERT-base
  framework: huggingface
  dtype: bfloat16

train_cuda_graph: true   # emit the graph[sdpa] variant

shapes:
  - { b: 16, s: 32,  kind: query }
  - { b: 32, s: 32,  kind: query }
  - { b: 64, s: 32,  kind: query }
  - { b: 16, s: 128, kind: query }
  - { b: 32, s: 128, kind: query }
  - { b: 64, s: 128, kind: query }

output:
  dir: benchmarks/results
  name: train_graph_shortS
