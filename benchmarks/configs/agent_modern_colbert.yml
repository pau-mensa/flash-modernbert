# Replicates the lightonai/Agent-ModernColBERT training recipe
# (https://huggingface.co/lightonai/Agent-ModernColBERT), stock vs fused.
#
# NOTE: the faithful lengths (doc 4096 / query 8192) at batch 32 need a large
# GPU (B200-class). On smaller cards, drop document_length / query_length /
# batch_size or use loss.mini_batch_size to chunk harder.
run:
  max_seconds: 300          # 5 minutes per variant (10 minutes total)
  warmup_steps: 5
  validate: true

model:
  name_or_path: lightonai/GTE-ModernColBERT-v1
  embedding_size: 128
  # PyLate query expansion pads EVERY query to query_length, so the card's max
  # (8192) would make queries dominate compute and risk OOM. 512 is practical;
  # document_length 4096 is faithful and is where the fused tail wins most.
  query_length: 512
  document_length: 4096

dataset:
  name: Tevatron/agent_ir-data
  split: train
  format: agent_ir          # flatten positive_passages / negative_passages lists
  num_negatives: 7
  query_instruction: "Instruct: Given a user's reasoning followed by a web search query, retrieve relevant passages that answer the query.\nQuery: "

trainer:
  batch_size: 32
  gradient_accumulation_steps: 1
  learning_rate: 3.0e-6
  bf16: true
  seed: 42

loss:
  type: cached_contrastive
  mini_batch_size: 8

cuda_graph: false           # inference-only; skipped under training autocast

output:
  dir: benchmarks/results
  name: agent_modern_colbert
